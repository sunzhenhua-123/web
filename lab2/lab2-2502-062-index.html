<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="lab2.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="alb2.jpg" alt="图书封面">
    </div>
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>热门推荐</li>
        <li>关于我们</li>
    </ul>
</header>

<div class="container">
    <aside class="left">
        <h2>图书分类</h2>
        <ul>
            <li>计算机编程</li>
            <li>文学小说</li>
            <li>历史社科</li>
            <li>科普读物</li>
        </ul>
    </aside>

    <main class="middle">
        <div class="book-box">
            <img src="lab22.jpg" alt="图书">
            <div class="tip">热销中</div>
        </div>

        <div class="hot">
            <h2>热门推荐</h2>
            <div class="hot-item">热门图书1</div>
            <div class="hot-item">热门图书2</div>
            <div class="hot-item">热门图书3</div>
        </div>

        <div class="new-book">
            <h2>新书上市</h2>
            <table border="1" cellpadding="8" cellspacing="0">
                <tr>
                    <td>书名</td>
                    <td>价格</td>
                    <td>上架时间</td>
                </tr>
                <tr>
                    <td>HTML网页设计</td>
                    <td>59元</td>
                    <td>2026-04-21</td>
                </tr>
                <tr>
                    <td>CSS布局基础</td>
                    <td>45元</td>
                    <td>2026-04-21</td>
                </tr>
            </table>
        </div>
    </main>

    <aside class="right">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>会员享8折优惠</p>
        <p>新用户首单立减</p>
    </aside>
</div>

</body>
</html>
